<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpeakApp Content Dashboard</title>
  <link rel="stylesheet" href="/dashboard/styles.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>SpeakApp Content Dashboard</h1>
      <p class="muted">Gestiona draft/publicación de training content.</p>
    </header>

    <section class="card">
      <div class="row row-wrap gap-sm">
        <label class="field grow">
          <span>Admin token</span>
          <input id="tokenInput" type="password" autocomplete="off" placeholder="x-content-token" />
        </label>
        <label class="checkbox">
          <input id="showToken" type="checkbox" />
          Mostrar
        </label>
        <button id="saveTokenBtn" class="btn">Guardar token</button>
      </div>
      <p class="hint">El token se guarda localmente en este navegador.</p>
    </section>

    <section class="card">
      <div class="row row-wrap gap-sm">
        <button id="healthBtn" class="btn">Health</button>
        <button id="loadDraftBtn" class="btn btn-primary">Cargar draft</button>
        <button id="loadPublicBtn" class="btn">Cargar público</button>
        <button id="validateBtn" class="btn">Validar JSON</button>
        <button id="saveDraftBtn" class="btn btn-primary">Guardar draft</button>
      </div>
      <div class="row row-wrap gap-sm top-md">
        <label class="field grow">
          <span>Nombre release</span>
          <input id="releaseNameInput" type="text" autocomplete="off" placeholder="release-1.1.0" />
        </label>
        <button id="publishBtn" class="btn btn-success">Publicar draft</button>
      </div>
      <pre id="statusBox" class="status">Listo.</pre>
    </section>

    <section class="card">
      <div class="row row-wrap gap-sm">
        <button id="modeGuidedBtn" class="btn btn-primary">Editor guiado</button>
        <button id="modeJsonBtn" class="btn">JSON avanzado</button>
        <button id="syncFromJsonBtn" class="btn">Aplicar JSON al guiado</button>
      </div>
    </section>

    <section id="guidedSection" class="card">
      <div class="row between center">
        <h2>Editor guiado</h2>
        <small id="guidedCountsBox" class="muted"></small>
      </div>

      <div class="guided-grid">
        <article class="guided-col">
          <div class="row between center">
            <h3>Routes</h3>
            <button id="addRouteBtn" class="btn">+ Route</button>
          </div>
          <div id="routesList" class="entity-list"></div>
          <div class="entity-form">
            <label class="field">
              <span>Route ID</span>
              <input id="routeIdInput" type="text" autocomplete="off" />
            </label>
            <label class="field">
              <span>Título</span>
              <input id="routeTitleInput" type="text" autocomplete="off" />
            </label>
            <label class="field">
              <span>Nota</span>
              <textarea id="routeNoteInput" rows="3"></textarea>
            </label>
            <div class="row row-wrap gap-sm">
              <button id="saveRouteBtn" class="btn btn-primary">Guardar</button>
              <button id="moveRouteUpBtn" class="btn">↑</button>
              <button id="moveRouteDownBtn" class="btn">↓</button>
              <button id="deleteRouteBtn" class="btn btn-danger">Eliminar</button>
            </div>
          </div>
        </article>

        <article class="guided-col">
          <div class="row between center">
            <h3>Módulos</h3>
            <button id="addModuleBtn" class="btn">+ Módulo</button>
          </div>
          <p id="selectedRouteLabel" class="hint"></p>
          <div id="modulesList" class="entity-list"></div>
          <div class="entity-form">
            <label class="field">
              <span>Módulo ID</span>
              <input id="moduleIdInput" type="text" autocomplete="off" />
            </label>
            <label class="field">
              <span>Título</span>
              <input id="moduleTitleInput" type="text" autocomplete="off" />
            </label>
            <label class="field">
              <span>Subtítulo</span>
              <input id="moduleSubtitleInput" type="text" autocomplete="off" />
            </label>
            <div class="row row-wrap gap-sm">
              <button id="saveModuleBtn" class="btn btn-primary">Guardar</button>
              <button id="moveModuleUpBtn" class="btn">↑</button>
              <button id="moveModuleDownBtn" class="btn">↓</button>
              <button id="deleteModuleBtn" class="btn btn-danger">Eliminar</button>
            </div>
          </div>
        </article>

        <article class="guided-col">
          <div class="row between center">
            <h3>Sesiones</h3>
            <button id="addSessionBtn" class="btn">+ Sesión</button>
          </div>
          <p id="selectedModuleLabel" class="hint"></p>
          <div id="sessionsList" class="entity-list"></div>
          <div class="entity-form">
            <label class="field">
              <span>Session ID</span>
              <input id="sessionIdInput" type="text" autocomplete="off" />
            </label>
            <label class="field">
              <span>Título</span>
              <input id="sessionTitleInput" type="text" autocomplete="off" />
            </label>
            <label class="field">
              <span>Focus</span>
              <input id="sessionFocusInput" type="text" autocomplete="off" />
            </label>
            <div class="row row-wrap gap-sm">
              <button id="saveSessionBtn" class="btn btn-primary">Guardar</button>
              <button id="moveSessionUpBtn" class="btn">↑</button>
              <button id="moveSessionDownBtn" class="btn">↓</button>
              <button id="deleteSessionBtn" class="btn btn-danger">Eliminar</button>
            </div>
          </div>
        </article>

        <article class="guided-col">
          <div class="row between center">
            <h3>Contenido sesión</h3>
          </div>
          <p id="selectedSessionLabel" class="hint"></p>
          <div class="entity-form">
            <div class="form-section-title">Sound (práctica 1)</div>
            <label class="field">
              <span>Sound title</span>
              <input id="sessionSoundTitleInput" type="text" autocomplete="off" />
            </label>
            <label class="field">
              <span>Sound hint</span>
              <textarea id="sessionSoundHintInput" rows="2"></textarea>
            </label>
            <div class="row row-wrap gap-sm">
              <label class="field grow">
                <span>Sound phonetic</span>
                <input id="sessionSoundPhoneticInput" type="text" autocomplete="off" />
              </label>
              <label class="field grow">
                <span>Sound expected</span>
                <input id="sessionSoundExpectedInput" type="text" autocomplete="off" />
              </label>
            </div>

            <div class="form-section-title">Spelling (palabras)</div>
            <label class="field">
              <span>Spelling title</span>
              <input id="sessionSpellingTitleInput" type="text" autocomplete="off" />
            </label>
            <label class="field">
              <span>Spelling hint</span>
              <textarea id="sessionSpellingHintInput" rows="2"></textarea>
            </label>
            <label class="field">
              <span>Words (una por línea)</span>
              <textarea id="sessionSpellingWordsInput" rows="5"></textarea>
            </label>

            <div class="form-section-title">Sentence (frase)</div>
            <label class="field">
              <span>Sentence title</span>
              <input id="sessionSentenceTitleInput" type="text" autocomplete="off" />
            </label>
            <label class="field">
              <span>Sentence hint</span>
              <textarea id="sessionSentenceHintInput" rows="2"></textarea>
            </label>
            <label class="field">
              <span>Sentence text</span>
              <textarea id="sessionSentenceTextInput" rows="3"></textarea>
            </label>
            <label class="field">
              <span>Sentence expected</span>
              <textarea id="sessionSentenceExpectedInput" rows="3"></textarea>
            </label>
          </div>
        </article>
      </div>
    </section>

    <section id="jsonSection" class="card">
      <div class="row between center">
        <h2>Editor JSON (draft)</h2>
        <small id="countsBox" class="muted"></small>
      </div>
      <textarea id="jsonEditor" spellcheck="false"></textarea>
    </section>

    <section class="card">
      <div class="row between center">
        <h2>Releases</h2>
        <button id="refreshReleasesBtn" class="btn">Refrescar</button>
      </div>
      <div id="releasesBox" class="releases"></div>
    </section>
  </main>

  <script src="/dashboard/app.js"></script>
</body>
</html>
