<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Realtime Monitor</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      margin: 0;
      background: #f6f7fb;
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: #1d2433;
    }
    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 1.8rem;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 1.1rem;
      color: #222c3c;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e0e4ec;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin: 10px 0;
      flex-wrap: wrap;
    }
    .row label {
      width: 120px;
      font-size: 0.9rem;
      color: #5a6477;
    }
    input, textarea, select {
      flex: 1;
      min-width: 220px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #d0d6e2;
      font-size: 0.95rem;
      background: #fff;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
    }
    button {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid #d0d6e2;
      background: #0f172a;
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button.secondary {
      background: #fff;
      color: #0f172a;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status-pill {
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #334155;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .status-pill[data-state="connected"] {
      background: #dcfce7;
      color: #166534;
    }
    .status-pill[data-state="failed"],
    .status-pill[data-state="disconnected"] {
      background: #fee2e2;
      color: #991b1b;
    }
    .log {
      background: #0b1020;
      color: #d0f5d0;
      padding: 12px;
      border-radius: 12px;
      height: 240px;
      overflow: auto;
      font-size: 0.85rem;
      white-space: pre-wrap;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .table-wrap {
      overflow-x: auto;
    }
    th, td {
      text-align: left;
      padding: 8px 6px;
      border-bottom: 1px solid #edf0f6;
      vertical-align: top;
    }
    th {
      color: #6b7280;
      font-weight: 600;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.82rem;
    }
    .cell-stack {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #334155;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .muted {
      color: #6b7280;
      font-size: 0.85rem;
    }
    @media (max-width: 640px) {
      .row label {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Realtime Monitor</h1>

    <section class="card">
      <h2>Connection</h2>
      <div class="row">
        <label>App key</label>
        <input id="app-key" value="dev-key-123456">
      </div>
      <div class="row">
        <label>WS host</label>
        <input id="ws-host" value="realtime.curso-ingles.com">
      </div>
      <div class="row">
        <label>WSS port</label>
        <input id="wss-port" type="number" value="443">
      </div>
      <div class="row">
        <label>Force TLS</label>
        <select id="force-tls">
          <option value="true" selected>true</option>
          <option value="false">false</option>
        </select>
      </div>
      <div class="row">
        <label>Auth endpoint</label>
        <input id="auth-endpoint" value="https://realtime.curso-ingles.com/realtime/auth">
      </div>
      <div class="row">
        <label>User id</label>
        <input id="auth-user-id" placeholder="optional for presence">
      </div>
      <div class="row">
        <label>User name</label>
        <input id="auth-user-name" placeholder="optional for presence">
      </div>
      <div class="row">
        <button id="connect">Connect</button>
        <button id="disconnect" class="secondary">Disconnect</button>
        <span id="conn-status" class="status-pill" data-state="disconnected">disconnected</span>
      </div>
      <div class="muted">Tip: use private-coach-USER_ID for the app channel.</div>
    </section>

    <section class="card">
      <h2>Send / Subscribe</h2>
      <div class="row">
        <label>Channel</label>
        <input id="channel" value="demo-public">
      </div>
      <div class="row">
        <label>Event</label>
        <input id="event" value="bot_message">
      </div>
      <div class="row">
        <label>Message</label>
        <textarea id="message" placeholder="Type a message..."></textarea>
      </div>
      <div class="row">
        <button id="subscribe">Subscribe</button>
        <button id="unsubscribe" class="secondary">Unsubscribe</button>
        <button id="send">Send</button>
      </div>
    </section>

    <section class="card">
      <h2>Channels</h2>
      <div class="row">
        <label>Prefix</label>
        <input id="channel-prefix" value="private-coach-">
      </div>
      <div class="row">
        <label>Monitor token</label>
        <input id="monitor-token" type="password" placeholder="optional">
      </div>
      <div class="row">
        <label>Channels endpoint</label>
        <input id="channels-endpoint" value="https://realtime.curso-ingles.com/realtime/channels">
      </div>
      <div class="row">
        <button id="refresh-channels">Refresh</button>
        <span id="channels-status" class="muted"></span>
      </div>
      <div id="channels-output" class="muted">No data yet.</div>
    </section>

    <section class="card">
      <h2>Community Monitor</h2>
      <div class="row">
        <label>User id</label>
        <input id="community-user-filter" placeholder="optional">
      </div>
      <div class="row">
        <label>UUID</label>
        <input id="community-uuid-filter" placeholder="optional">
      </div>
      <div class="row">
        <label>Room id</label>
        <input id="community-room-filter" placeholder="optional">
      </div>
      <div class="row">
        <label>Audit type</label>
        <input id="community-audit-type" placeholder="optional">
      </div>
      <div class="row">
        <label>Limit</label>
        <input id="community-audit-limit" type="number" value="100" min="1" max="1000">
      </div>
      <div class="row">
        <button id="refresh-community-presence">Presence</button>
        <button id="refresh-community-tokens" class="secondary">Push devices</button>
        <button id="refresh-community-audit" class="secondary">Audit</button>
        <button id="refresh-community-all" class="secondary">Refresh all</button>
      </div>
      <div id="community-monitor-status" class="muted">No data yet.</div>
    </section>

    <section class="card">
      <h2>Community Presence</h2>
      <div id="community-presence-output" class="muted">No data yet.</div>
    </section>

    <section class="card">
      <h2>Push Devices</h2>
      <div id="community-tokens-output" class="muted">No data yet.</div>
    </section>

    <section class="card">
      <h2>Community Audit</h2>
      <div id="community-audit-output" class="muted">No data yet.</div>
    </section>

    <section class="card">
      <h2>Log</h2>
      <div id="log" class="log"></div>
    </section>
  </div>

  <script src="/vendor/pusher/pusher.min.js"></script>
  <script>
    const el = (id) => document.getElementById(id);
    const logEl = el('log');
    const statusEl = el('conn-status');
    const channelsOutput = el('channels-output');
    const channelsStatus = el('channels-status');
    const communityMonitorStatus = el('community-monitor-status');
    const communityPresenceOutput = el('community-presence-output');
    const communityTokensOutput = el('community-tokens-output');
    const communityAuditOutput = el('community-audit-output');

    const log = (line) => {
      const ts = new Date().toISOString();
      logEl.textContent += `[${ts}] ${line}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    };

    const escapeHtml = (value) =>
      String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');

    const formatText = (value, fallback = '-') => {
      const text = String(value == null ? '' : value).trim();
      return text || fallback;
    };

    const formatTs = (value) => {
      const text = String(value == null ? '' : value).trim();
      if (!text) return '-';
      const date = new Date(text);
      if (Number.isNaN(date.getTime())) return escapeHtml(text);
      return escapeHtml(date.toLocaleString());
    };

    const getMonitorToken = () => el('monitor-token').value.trim();

    const buildMonitorUrl = (pathname) => {
      const channelsEndpoint = el('channels-endpoint').value.trim() || window.location.href;
      return new URL(pathname, channelsEndpoint).toString();
    };

    const fetchMonitorJson = async (pathname, params = {}) => {
      const url = new URL(buildMonitorUrl(pathname));
      Object.entries(params || {}).forEach(([key, value]) => {
        const text = String(value == null ? '' : value).trim();
        if (text) url.searchParams.set(key, text);
      });
      const headers = {};
      const token = getMonitorToken();
      if (token) headers['x-monitor-token'] = token;
      const res = await fetch(url.toString(), { headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const error = data && (data.error || data.message) ? data.error || data.message : `status ${res.status}`;
        throw new Error(error);
      }
      return data;
    };

    const getCommunityMonitorFilters = () => ({
      user_id: el('community-user-filter').value.trim(),
      uuid: el('community-uuid-filter').value.trim(),
      room_id: el('community-room-filter').value.trim(),
      type: el('community-audit-type').value.trim(),
      limit: el('community-audit-limit').value.trim()
    });

    let pusher = null;
    let channel = null;
    let channelName = '';

    const readConfig = () => ({
      appKey: el('app-key').value.trim(),
      wsHost: el('ws-host').value.trim(),
      wssPort: parseInt(el('wss-port').value, 10) || 443,
      forceTLS: el('force-tls').value === 'true',
      authEndpoint: el('auth-endpoint').value.trim(),
      userId: el('auth-user-id').value.trim(),
      userName: el('auth-user-name').value.trim()
    });

    const updateStatus = (state) => {
      statusEl.textContent = state;
      statusEl.setAttribute('data-state', state);
    };

    const disconnect = () => {
      if (channel && pusher) {
        channel.unbind_all();
        pusher.unsubscribe(channelName);
      }
      channel = null;
      channelName = '';
      if (pusher) {
        pusher.disconnect();
        pusher = null;
      }
      updateStatus('disconnected');
    };

    const connect = () => {
      if (typeof window.Pusher !== 'function') {
        log('Pusher is not available (check /vendor/pusher/pusher.min.js).');
        return;
      }
      const cfg = readConfig();
      if (!cfg.appKey) {
        log('Missing app key.');
        return;
      }
      disconnect();

      const options = {
        wsHost: cfg.wsHost,
        wssPort: cfg.wssPort,
        forceTLS: cfg.forceTLS,
        enabledTransports: ['ws', 'wss'],
        disableStats: true
      };
      if (cfg.authEndpoint) {
        options.authEndpoint = cfg.authEndpoint;
      }
      if (cfg.userId || cfg.userName) {
        const info = {};
        if (cfg.userName) info.name = cfg.userName;
        options.auth = {
          params: {
            user_id: cfg.userId || 'monitor',
            user_info: JSON.stringify(info)
          }
        };
      }

      pusher = new window.Pusher(cfg.appKey, options);
      pusher.connection.bind('state_change', (state) => {
        updateStatus(state.current);
        log(`state: ${state.current}`);
      });
      pusher.connection.bind('error', (err) => {
        log(`conn error: ${JSON.stringify(err)}`);
      });
      log('connecting...');
    };

    const bindChannel = (ch) => {
      ch.bind('pusher:subscription_succeeded', () => log('subscribed'));
      ch.bind('pusher:subscription_error', (st) => log(`sub error: ${st}`));
      ch.bind('chat_message', (data) => log(`chat_message: ${JSON.stringify(data)}`));
      ch.bind('bot_message', (data) => log(`bot_message: ${JSON.stringify(data)}`));
      ch.bind('user_message', (data) => log(`user_message: ${JSON.stringify(data)}`));
    };

    const subscribe = () => {
      const name = el('channel').value.trim();
      if (!name) return;
      if (!pusher) connect();
      if (!pusher) return;

      if (channel) {
        channel.unbind_all();
        pusher.unsubscribe(channelName);
      }
      channelName = name;
      channel = pusher.subscribe(name);
      bindChannel(channel);
      log(`subscribing: ${name}`);
    };

    const unsubscribe = () => {
      if (!pusher || !channel) return;
      channel.unbind_all();
      pusher.unsubscribe(channelName);
      log(`unsubscribed: ${channelName}`);
      channel = null;
      channelName = '';
    };

    const send = async () => {
      const channelValue = el('channel').value.trim();
      const eventValue = el('event').value.trim() || 'bot_message';
      const text = el('message').value.trim();
      if (!channelValue || !text) return;
      const payload = {
        channel: channelValue,
        event: eventValue,
        data: { text, role: 'bot' }
      };
      try {
        const res = await fetch('https://realtime.curso-ingles.com/realtime/emit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        log(`emit status: ${res.status}`);
      } catch (err) {
        log(`emit error: ${err.message}`);
      }
    };

    const refreshChannels = async () => {
      const endpoint = el('channels-endpoint').value.trim();
      if (!endpoint) return;
      const prefix = el('channel-prefix').value.trim();
      const token = el('monitor-token').value.trim();
      const url = new URL(endpoint);
      if (prefix) url.searchParams.set('filter_by_prefix', prefix);
      url.searchParams.set('info', 'subscription_count');
      if (token) url.searchParams.set('token', token);

      channelsStatus.textContent = 'loading...';
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 8000);
        const res = await fetch(url.toString(), { signal: controller.signal });
        clearTimeout(timeout);
        const data = await res.json();
        channelsStatus.textContent = `status ${res.status}`;
        renderChannels(data);
      } catch (err) {
        channelsStatus.textContent = err.name === 'AbortError' ? 'timeout' : 'error';
        channelsOutput.textContent = err.message;
      }
    };

    const renderChannels = (data) => {
      if (!data || !data.channels) {
        channelsOutput.textContent = 'No channels data.';
        return;
      }
      const names = Object.keys(data.channels);
      if (!names.length) {
        channelsOutput.textContent = 'No active channels.';
        return;
      }
      const rows = names
        .sort()
        .map((name) => {
          const info = data.channels[name] || {};
          const count = info.subscription_count !== undefined ? info.subscription_count : '-';
          return `<tr><td>${name}</td><td>${count}</td></tr>`;
        })
        .join('');
      channelsOutput.innerHTML =
        `<table><thead><tr><th>Channel</th><th>Subs</th></tr></thead><tbody>${rows}</tbody></table>`;
    };

    const renderCommunityPresence = (data) => {
      const users = Array.isArray(data && data.users) ? data.users : [];
      if (!users.length) {
        communityPresenceOutput.textContent = 'No active presence data.';
        return;
      }
      const rows = users
        .map((user) => {
          const sessions = Array.isArray(user && user.sessions) ? user.sessions : [];
          const sessionsHtml = sessions.length
            ? sessions
                .map((session) => {
                  const context = session && session.context ? session.context : {};
                  return `
                    <div class="cell-stack">
                      <span class="pill">${escapeHtml(formatText(session.platform || session.app || 'unknown'))}</span>
                      <span class="mono">${escapeHtml(formatText(session.uuid))}</span>
                      <span>${escapeHtml(formatText(context.app_state))} / ${escapeHtml(formatText(context.tab))}</span>
                      <span>${escapeHtml(formatText(context.active_room_type))} ${escapeHtml(formatText(context.active_room_id, ''))}</span>
                      <span class="mono">${escapeHtml(formatText(session.ip))}</span>
                    </div>
                  `;
                })
                .join('')
            : '-';
          return `
            <tr>
              <td>${escapeHtml(formatText(user.user_id))}</td>
              <td>
                <div class="cell-stack">
                  <strong>${escapeHtml(formatText(user.name))}</strong>
                  <span class="muted">${escapeHtml(formatText(user.app))}</span>
                </div>
              </td>
              <td>${escapeHtml(String(user.sessions_count ?? '-'))}</td>
              <td>${escapeHtml(formatText(user.viewing_dm_room_id || (user.viewing_public ? 'public' : '')))}</td>
              <td>${formatTs(user.last_seen_at)}</td>
              <td>${sessionsHtml}</td>
            </tr>
          `;
        })
        .join('');
      communityPresenceOutput.innerHTML = `
        <div class="muted">Room: ${escapeHtml(formatText(data.room_id))} · Users: ${escapeHtml(String(data.user_count ?? users.length))}</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>User</th>
                <th>Name</th>
                <th>Sessions</th>
                <th>Active room</th>
                <th>Last seen</th>
                <th>Session detail</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    };

    const renderCommunityTokens = (data) => {
      const tokens = Array.isArray(data && data.tokens) ? data.tokens : [];
      if (!tokens.length) {
        communityTokensOutput.textContent = 'No push devices found.';
        return;
      }
      const rows = tokens
        .map((entry) => `
          <tr>
            <td>${escapeHtml(formatText(entry.user_id))}</td>
            <td class="mono">${escapeHtml(formatText(entry.uuid))}</td>
            <td>${escapeHtml(formatText(entry.platform))}</td>
            <td>${escapeHtml(formatText(entry.token_type))}</td>
            <td class="mono">${escapeHtml(formatText(entry.token_masked))}</td>
            <td class="mono">${escapeHtml(formatText(entry.last_ip))}</td>
            <td>${formatTs(entry.updated_at)}</td>
          </tr>
        `)
        .join('');
      communityTokensOutput.innerHTML = `
        <div class="muted">Devices: ${escapeHtml(String(data.count ?? tokens.length))}</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>User</th>
                <th>UUID</th>
                <th>Platform</th>
                <th>Type</th>
                <th>Token</th>
                <th>Last IP</th>
                <th>Updated</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    };

    const renderCommunityAudit = (data) => {
      const events = Array.isArray(data && data.events) ? data.events : [];
      if (!events.length) {
        communityAuditOutput.textContent = 'No audit events.';
        return;
      }
      const rows = events
        .map((event) => `
          <tr>
            <td>${formatTs(event.ts)}</td>
            <td>${escapeHtml(formatText(event.type))}</td>
            <td>${escapeHtml(formatText(event.user_id))}</td>
            <td>${escapeHtml(formatText(event.room_id))}</td>
            <td class="mono">${escapeHtml(formatText(event.uuid))}</td>
            <td class="mono">${escapeHtml(formatText(event.ip))}</td>
            <td class="mono">${escapeHtml(formatText(event.message_id || event.token_key || event.channel || event.session_id))}</td>
          </tr>
        `)
        .join('');
      communityAuditOutput.innerHTML = `
        <div class="muted">Events: ${escapeHtml(String(data.count ?? events.length))}</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Timestamp</th>
                <th>Type</th>
                <th>User</th>
                <th>Room</th>
                <th>UUID</th>
                <th>IP</th>
                <th>Detail</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    };

    const refreshCommunityPresence = async () => {
      const filters = getCommunityMonitorFilters();
      const data = await fetchMonitorJson('/realtime/community/monitor/presence', {
        room_id: filters.room_id,
        user_id: filters.user_id
      });
      renderCommunityPresence(data);
      return data;
    };

    const refreshCommunityTokens = async () => {
      const filters = getCommunityMonitorFilters();
      const data = await fetchMonitorJson('/realtime/community/monitor/push-tokens', {
        user_id: filters.user_id,
        uuid: filters.uuid
      });
      renderCommunityTokens(data);
      return data;
    };

    const refreshCommunityAudit = async () => {
      const filters = getCommunityMonitorFilters();
      const data = await fetchMonitorJson('/realtime/community/monitor/audit', {
        user_id: filters.user_id,
        room_id: filters.room_id,
        uuid: filters.uuid,
        type: filters.type,
        limit: filters.limit
      });
      renderCommunityAudit(data);
      return data;
    };

    const refreshCommunityAll = async () => {
      communityMonitorStatus.textContent = 'loading...';
      try {
        await Promise.all([
          refreshCommunityPresence(),
          refreshCommunityTokens(),
          refreshCommunityAudit()
        ]);
        communityMonitorStatus.textContent = 'ok';
      } catch (err) {
        communityMonitorStatus.textContent = err.message;
      }
    };

    el('connect').addEventListener('click', connect);
    el('disconnect').addEventListener('click', disconnect);
    el('subscribe').addEventListener('click', subscribe);
    el('unsubscribe').addEventListener('click', unsubscribe);
    el('send').addEventListener('click', send);
    el('refresh-channels').addEventListener('click', refreshChannels);
    el('refresh-community-presence').addEventListener('click', () => {
      refreshCommunityPresence()
        .then(() => {
          communityMonitorStatus.textContent = 'presence ok';
        })
        .catch((err) => {
          communityMonitorStatus.textContent = err.message;
        });
    });
    el('refresh-community-tokens').addEventListener('click', () => {
      refreshCommunityTokens()
        .then(() => {
          communityMonitorStatus.textContent = 'push devices ok';
        })
        .catch((err) => {
          communityMonitorStatus.textContent = err.message;
        });
    });
    el('refresh-community-audit').addEventListener('click', () => {
      refreshCommunityAudit()
        .then(() => {
          communityMonitorStatus.textContent = 'audit ok';
        })
        .catch((err) => {
          communityMonitorStatus.textContent = err.message;
        });
    });
    el('refresh-community-all').addEventListener('click', refreshCommunityAll);

    connect();
    refreshCommunityAll().catch((err) => {
      communityMonitorStatus.textContent = err.message;
    });
  </script>
</body>
</html>
