<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TTS Isolated Test</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 28px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #dbe2ec;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      padding: 14px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.35rem;
    }
    .muted {
      color: #64748b;
      font-size: 0.9rem;
      margin: 4px 0 12px;
    }
    .grid {
      display: grid;
      gap: 10px;
    }
    @media (min-width: 680px) {
      .grid-2 {
        grid-template-columns: 1fr 1fr;
      }
    }
    label {
      font-size: 0.86rem;
      color: #334155;
      display: block;
      margin-bottom: 5px;
    }
    textarea,
    select,
    input[type="number"] {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 9px 10px;
      font: inherit;
      background: #fff;
      color: #0f172a;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    button {
      border: 1px solid #b9c6dc;
      background: #eaf0ff;
      color: #1d4ed8;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button.secondary {
      background: #eef2f7;
      color: #334155;
    }
    button.danger {
      background: #fee2e2;
      color: #b91c1c;
      border-color: #fecaca;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #0f766e;
    }
    .log {
      margin-top: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #0f172a;
      color: #dbeafe;
      padding: 10px;
      min-height: 180px;
      max-height: 360px;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .check {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.88rem;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>TTS Isolated Test</h1>
      <p class="muted">
        Standalone browser test with native Web Speech API only.
      </p>

      <div class="grid">
        <div>
          <label for="ttsText">Text</label>
          <textarea id="ttsText">This is an isolated browser text to speech test.</textarea>
        </div>

        <div class="grid grid-2">
          <div>
            <label for="ttsLang">Language</label>
            <select id="ttsLang">
              <option value="en-US">English (US)</option>
              <option value="en-GB">English (UK)</option>
              <option value="es-ES">Spanish (ES)</option>
            </select>
          </div>

          <div>
            <label for="ttsVoice">Voice</label>
            <select id="ttsVoice">
              <option value="">(auto)</option>
            </select>
          </div>
        </div>

        <div class="grid grid-2">
          <div>
            <label for="ttsRate">Rate (0.1 - 10)</label>
            <input id="ttsRate" type="number" min="0.1" max="10" step="0.1" value="1">
          </div>
          <div>
            <label for="ttsPitch">Pitch (0 - 2)</label>
            <input id="ttsPitch" type="number" min="0" max="2" step="0.1" value="1">
          </div>
        </div>

        <div class="row">
          <label class="check">
            <input id="cancelBefore" type="checkbox" checked>
            Cancel queue before speak
          </label>
          <label class="check">
            <input id="robustChromeMode" type="checkbox" checked>
            Robust Chrome workaround
          </label>
          <label class="check">
            <input id="logBoundary" type="checkbox">
            Log boundary events
          </label>
        </div>

        <div class="row">
          <button id="btnRefreshVoices" class="secondary">Refresh voices</button>
          <button id="btnPlay">Play</button>
          <button id="btnStop" class="danger">Stop</button>
          <button id="btnClearLog" class="secondary">Clear log</button>
        </div>
      </div>

      <div id="status" class="status">Ready.</div>
      <div id="log" class="log"></div>
    </div>
  </div>

  <script>
    (function () {
      const textEl = document.getElementById('ttsText');
      const langEl = document.getElementById('ttsLang');
      const voiceEl = document.getElementById('ttsVoice');
      const rateEl = document.getElementById('ttsRate');
      const pitchEl = document.getElementById('ttsPitch');
      const cancelBeforeEl = document.getElementById('cancelBefore');
      const robustChromeModeEl = document.getElementById('robustChromeMode');
      const logBoundaryEl = document.getElementById('logBoundary');
      const refreshBtn = document.getElementById('btnRefreshVoices');
      const playBtn = document.getElementById('btnPlay');
      const stopBtn = document.getElementById('btnStop');
      const clearLogBtn = document.getElementById('btnClearLog');
      const statusEl = document.getElementById('status');
      const logEl = document.getElementById('log');

      const synth = window.speechSynthesis;
      let voicesCache = [];
      let activeUtter = null;
      let pollTimer = null;
      let startWatchdog = null;
      let stuckWatchdog = null;
      let activeRun = null;
      let runSeq = 0;

      function now() {
        return new Date().toLocaleTimeString();
      }

      function setStatus(msg, tone) {
        statusEl.textContent = msg || '';
        statusEl.style.color = tone || '#0f766e';
      }

      function log(msg, data) {
        const suffix = data === undefined ? '' : ' ' + JSON.stringify(data);
        logEl.textContent += '[' + now() + '] ' + msg + suffix + '\n';
        logEl.scrollTop = logEl.scrollHeight;
      }

      function clearTimers() {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
        if (startWatchdog) {
          clearTimeout(startWatchdog);
          startWatchdog = null;
        }
        if (stuckWatchdog) {
          clearTimeout(stuckWatchdog);
          stuckWatchdog = null;
        }
      }

      function isChromeLikeBrowser() {
        const ua = String(navigator.userAgent || '');
        const isChromium = /Chrome|CriOS|Chromium/.test(ua);
        const isExcluded = /Edg|OPR|SamsungBrowser|DuckDuckGo/.test(ua);
        return isChromium && !isExcluded;
      }

      function wait(ms) {
        return new Promise(function (resolve) {
          setTimeout(resolve, Math.max(0, Number(ms) || 0));
        });
      }

      function voiceKey(voice) {
        if (!voice) return '';
        return String(voice.voiceURI || voice.name || '') + '|' + String(voice.lang || '');
      }

      function normalizeLang(value) {
        return String(value || '').toLowerCase();
      }

      function scoreVoiceForChrome(voice, lang) {
        if (!voice) return -9999;
        const voiceLang = normalizeLang(voice.lang);
        const target = normalizeLang(lang);
        const targetPrefix = target.split('-')[0];
        const voiceName = String(voice.name || '');
        let score = 0;
        if (voiceLang === target) score += 120;
        else if (targetPrefix && voiceLang.indexOf(targetPrefix) === 0) score += 70;
        if (/Google/i.test(voiceName)) score += 50;
        if (voice.localService) score += 18;
        if (voice.default) score += 10;
        if (/Samantha/i.test(voiceName)) score -= 20;
        return score;
      }

      function buildChromeVoiceAttempts(lang, selectedVoice) {
        const attempts = [];
        const seen = new Set();

        function pushAttempt(kind, voice, label) {
          const key = voice ? voiceKey(voice) : 'auto';
          if (seen.has(key)) return;
          seen.add(key);
          attempts.push({
            kind: kind,
            voice: voice || null,
            label: label || (voice ? voice.name + ' [' + voice.lang + ']' : '(auto)')
          });
        }

        if (selectedVoice) {
          pushAttempt('selected', selectedVoice, 'selected: ' + selectedVoice.name + ' [' + selectedVoice.lang + ']');
        }
        pushAttempt('auto', null, '(auto)');

        const targetLang = normalizeLang(lang || 'en-US');
        const matches = (voicesCache || [])
          .filter(function (voice) {
            if (!voice) return false;
            const voiceLang = normalizeLang(voice.lang);
            if (!voiceLang) return false;
            if (voiceLang === targetLang) return true;
            const prefix = targetLang.split('-')[0];
            return prefix && voiceLang.indexOf(prefix) === 0;
          })
          .slice()
          .sort(function (a, b) {
            return scoreVoiceForChrome(b, targetLang) - scoreVoiceForChrome(a, targetLang);
          });

        matches.slice(0, 4).forEach(function (voice) {
          pushAttempt('fallback', voice, 'fallback: ' + voice.name + ' [' + voice.lang + ']');
        });

        return attempts;
      }

      function renderVoices() {
        if (!synth || typeof synth.getVoices !== 'function') return;
        voicesCache = synth.getVoices() || [];
        const selected = voiceEl.value;
        voiceEl.innerHTML = '<option value="">(auto)</option>';
        voicesCache.forEach((voice, idx) => {
          const opt = document.createElement('option');
          opt.value = String(idx);
          opt.textContent = voice.name + ' [' + voice.lang + ']' + (voice.default ? ' (default)' : '');
          voiceEl.appendChild(opt);
        });
        if (selected && voiceEl.querySelector('option[value="' + selected + '"]')) {
          voiceEl.value = selected;
        }
        log('voices loaded', { count: voicesCache.length });
      }

      function stopSpeaking(reason) {
        if (!synth) return;
        if (activeRun) {
          activeRun.stopped = true;
          activeRun = null;
        }
        clearTimers();
        activeUtter = null;
        try {
          synth.cancel();
        } catch (err) {
          // no-op
        }
        if (reason) log('stop', { reason: reason });
        setStatus('Stopped.', '#b91c1c');
      }

      function startPoll(textLen) {
        clearTimers();
        pollTimer = setInterval(function () {
          if (!synth) return;
          log('poll', {
            speaking: !!synth.speaking,
            pending: !!synth.pending,
            paused: !!synth.paused
          });
        }, 700);
        startWatchdog = setTimeout(function () {
          if (!activeUtter) return;
          if (synth && !synth.speaking && !synth.pending) {
            log('watchdog: no start after 3s');
            setStatus('No start after 3s (possible browser issue).', '#b91c1c');
          }
        }, 3000);
        const maxSpeakMs = Math.max(4000, Math.min(15000, 2200 + Number(textLen || 0) * 120));
        stuckWatchdog = setTimeout(function () {
          if (!activeUtter || !synth) return;
          if (!synth.speaking && !synth.pending) return;
          log('watchdog: stuck-speaking-timeout', {
            speaking: !!synth.speaking,
            pending: !!synth.pending,
            timeoutMs: maxSpeakMs
          });
          try {
            synth.cancel();
          } catch (err) {
            // no-op
          }
          clearTimers();
          activeUtter = null;
          setStatus('Stuck speaking timeout: canceled.', '#b91c1c');
        }, maxSpeakMs);
      }

      function startPollRobust(run, attempt, textLen) {
        clearTimers();
        pollTimer = setInterval(function () {
          if (!synth || !activeRun || activeRun.id !== run.id) return;
          log('poll', {
            speaking: !!synth.speaking,
            pending: !!synth.pending,
            paused: !!synth.paused,
            attempt: attempt.index + 1
          });
        }, 700);

        startWatchdog = setTimeout(function () {
          if (!activeRun || activeRun.id !== run.id) return;
          if (run.attemptToken !== attempt.token) return;
          if (attempt.started) return;

          log('watchdog: no-start', {
            attempt: attempt.index + 1,
            speaking: !!(synth && synth.speaking),
            pending: !!(synth && synth.pending),
            voice: attempt.voice ? attempt.voice.name : '(auto)'
          });

          if (run.nextAttempt) {
            run.internalRetry = true;
            try {
              synth.cancel();
            } catch (err) {
              // no-op
            }
            clearTimers();
            run.nextAttempt('no-start');
            return;
          }

          setStatus('No start after retries (Chrome/Web Speech issue).', '#b91c1c');
        }, 2800);

        const maxSpeakMs = Math.max(5000, Math.min(18000, 2400 + Number(textLen || 0) * 125));
        stuckWatchdog = setTimeout(function () {
          if (!activeRun || activeRun.id !== run.id) return;
          if (run.attemptToken !== attempt.token) return;
          if (!synth) return;
          if (!synth.speaking && !synth.pending) return;

          log('watchdog: stuck-speaking', {
            attempt: attempt.index + 1,
            speaking: !!synth.speaking,
            pending: !!synth.pending,
            started: !!attempt.started,
            timeoutMs: maxSpeakMs
          });

          if (!attempt.started && run.nextAttempt) {
            run.internalRetry = true;
            try {
              synth.cancel();
            } catch (err) {
              // no-op
            }
            clearTimers();
            run.nextAttempt('stuck-no-start');
            return;
          }

          try {
            synth.cancel();
          } catch (err) {
            // no-op
          }
          clearTimers();
          activeUtter = null;
          activeRun = null;
          setStatus('Stuck speaking timeout: canceled.', '#b91c1c');
        }, maxSpeakMs);
      }

      function playTtsRobust() {
        if (!synth || typeof window.SpeechSynthesisUtterance === 'undefined') {
          setStatus('Web Speech API not available.', '#b91c1c');
          return;
        }

        const text = String(textEl.value || '').trim();
        if (!text) {
          setStatus('Text is empty.', '#b91c1c');
          return;
        }

        const lang = langEl.value || 'en-US';
        const rate = Math.max(0.1, Number(rateEl.value || 1));
        const pitch = Math.max(0, Number(pitchEl.value || 1));

        const selectedIndex = voiceEl.value;
        let chosenVoice = null;
        if (selectedIndex !== '') {
          const idx = Number(selectedIndex);
          if (Number.isInteger(idx) && voicesCache[idx]) {
            chosenVoice = voicesCache[idx];
          }
        }

        const chromeLike = isChromeLikeBrowser();
        const attempts = chromeLike
          ? buildChromeVoiceAttempts(lang, chosenVoice)
          : [{
              kind: chosenVoice ? 'selected' : 'auto',
              voice: chosenVoice || null,
              label: chosenVoice ? ('selected: ' + chosenVoice.name + ' [' + chosenVoice.lang + ']') : '(auto)'
            }];

        if (!attempts.length) {
          setStatus('No voice attempts available.', '#b91c1c');
          return;
        }

        stopSpeaking('restart');

        const run = {
          id: ++runSeq,
          stopped: false,
          internalRetry: false,
          attemptToken: 0,
          attemptIndex: -1,
          attempts: attempts
        };
        activeRun = run;

        setStatus('Requested (robust mode)...', '#1d4ed8');

        const nextAttempt = async function (reason) {
          if (!activeRun || activeRun.id !== run.id || run.stopped) return;
          run.attemptIndex += 1;
          if (run.attemptIndex >= run.attempts.length) {
            activeRun = null;
            activeUtter = null;
            clearTimers();
            log('robust: exhausted attempts');
            setStatus('No working voice found (Chrome/Web Speech issue).', '#b91c1c');
            return;
          }

          const attemptMeta = run.attempts[run.attemptIndex];
          const attempt = {
            index: run.attemptIndex,
            token: ++run.attemptToken,
            started: false,
            finished: false,
            voice: attemptMeta.voice || null
          };
          run.internalRetry = false;
          run.nextAttempt = function (retryReason) {
            if (!activeRun || activeRun.id !== run.id || run.stopped) return;
            log('robust: retry', { reason: retryReason, nextAttempt: run.attemptIndex + 2 });
            setTimeout(function () {
              nextAttempt(retryReason);
            }, 140);
          };

          clearTimers();
          activeUtter = null;

          try {
            if (typeof synth.cancel === 'function') synth.cancel();
          } catch (err) {
            // no-op
          }
          try {
            if (typeof synth.resume === 'function') synth.resume();
          } catch (err) {
            // no-op
          }
          await wait(cancelBeforeEl.checked ? 120 : 40);
          if (!activeRun || activeRun.id !== run.id || run.stopped) return;
          if (run.attemptToken !== attempt.token) return;

          const utter = new SpeechSynthesisUtterance(text);
          utter.lang = lang;
          utter.rate = rate;
          utter.pitch = pitch;
          utter.volume = 1;
          if (attemptMeta.voice) {
            utter.voice = attemptMeta.voice;
          }

          utter.onstart = function () {
            if (!activeRun || activeRun.id !== run.id || run.attemptToken !== attempt.token) return;
            attempt.started = true;
            log('event:onstart', {
              lang: utter.lang,
              voice: utter.voice ? utter.voice.name : null,
              attempt: attempt.index + 1
            });
            setStatus('Speaking... (attempt ' + (attempt.index + 1) + ')', '#0f766e');
          };
          utter.onend = function () {
            if (!activeRun || activeRun.id !== run.id || run.attemptToken !== attempt.token) return;
            attempt.finished = true;
            log('event:onend', { attempt: attempt.index + 1 });
            clearTimers();
            activeUtter = null;
            activeRun = null;
            setStatus('Done.', '#0f766e');
          };
          utter.onerror = function (event) {
            if (!activeRun || activeRun.id !== run.id || run.attemptToken !== attempt.token) return;
            const errorCode = event && event.error ? event.error : 'unknown';
            if (run.internalRetry && errorCode === 'canceled') {
              log('event:onerror (ignored)', { error: errorCode, attempt: attempt.index + 1 });
              return;
            }
            log('event:onerror', { error: errorCode, attempt: attempt.index + 1 });
            clearTimers();
            activeUtter = null;
            if (!attempt.started && run.attemptIndex < run.attempts.length - 1) {
              run.nextAttempt('onerror:' + errorCode);
              return;
            }
            activeRun = null;
            setStatus('Error: ' + errorCode, '#b91c1c');
          };
          utter.onpause = function () {
            if (!activeRun || activeRun.id !== run.id || run.attemptToken !== attempt.token) return;
            log('event:onpause', { attempt: attempt.index + 1 });
          };
          utter.onresume = function () {
            if (!activeRun || activeRun.id !== run.id || run.attemptToken !== attempt.token) return;
            log('event:onresume', { attempt: attempt.index + 1 });
          };
          utter.onboundary = function (event) {
            if (!logBoundaryEl.checked) return;
            if (!activeRun || activeRun.id !== run.id || run.attemptToken !== attempt.token) return;
            log('event:onboundary', {
              attempt: attempt.index + 1,
              name: event && event.name ? event.name : '',
              charIndex: event && typeof event.charIndex === 'number' ? event.charIndex : -1
            });
          };

          activeUtter = utter;
          log('speak() [robust]', {
            attempt: attempt.index + 1,
            attemptsTotal: run.attempts.length,
            reason: reason || 'initial',
            lang: utter.lang,
            rate: utter.rate,
            pitch: utter.pitch,
            voice: utter.voice ? utter.voice.name : '(auto)',
            label: attemptMeta.label,
            textLen: text.length
          });

          try {
            synth.speak(utter);
            startPollRobust(run, attempt, text.length);
          } catch (err) {
            log('exception', { message: err && err.message ? err.message : String(err) });
            if (run.attemptIndex < run.attempts.length - 1) {
              run.nextAttempt('exception');
              return;
            }
            clearTimers();
            activeUtter = null;
            activeRun = null;
            setStatus('Exception: ' + (err && err.message ? err.message : String(err)), '#b91c1c');
          }
        };

        nextAttempt('initial');
      }

      function playTts() {
        if (!synth || typeof window.SpeechSynthesisUtterance === 'undefined') {
          setStatus('Web Speech API not available.', '#b91c1c');
          return;
        }

        const text = String(textEl.value || '').trim();
        if (!text) {
          setStatus('Text is empty.', '#b91c1c');
          return;
        }

        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = langEl.value || 'en-US';
        utter.rate = Math.max(0.1, Number(rateEl.value || 1));
        utter.pitch = Math.max(0, Number(pitchEl.value || 1));
        utter.volume = 1;

        const selectedIndex = voiceEl.value;
        let chosenVoice = null;
        if (selectedIndex !== '') {
          const idx = Number(selectedIndex);
          if (Number.isInteger(idx) && voicesCache[idx]) {
            chosenVoice = voicesCache[idx];
          }
        }
        if (chosenVoice) utter.voice = chosenVoice;

        utter.onstart = function () {
          log('event:onstart', { lang: utter.lang, voice: utter.voice ? utter.voice.name : null });
          setStatus('Speaking...', '#0f766e');
        };
        utter.onend = function () {
          log('event:onend');
          clearTimers();
          activeUtter = null;
          setStatus('Done.', '#0f766e');
        };
        utter.onerror = function (event) {
          log('event:onerror', { error: event && event.error ? event.error : 'unknown' });
          clearTimers();
          activeUtter = null;
          setStatus('Error: ' + (event && event.error ? event.error : 'unknown'), '#b91c1c');
        };
        utter.onpause = function () {
          log('event:onpause');
        };
        utter.onresume = function () {
          log('event:onresume');
        };
        utter.onboundary = function (event) {
          if (!logBoundaryEl.checked) return;
          log('event:onboundary', {
            name: event && event.name ? event.name : '',
            charIndex: event && typeof event.charIndex === 'number' ? event.charIndex : -1
          });
        };

        try {
          if (cancelBeforeEl.checked) {
            synth.cancel();
          }
          activeUtter = utter;
          log('speak()', {
            lang: utter.lang,
            rate: utter.rate,
            pitch: utter.pitch,
            voice: utter.voice ? utter.voice.name : '(auto)',
            textLen: text.length
          });
          synth.speak(utter);
          startPoll(text.length);
          setStatus('Requested...', '#1d4ed8');
        } catch (err) {
          log('exception', { message: err && err.message ? err.message : String(err) });
          setStatus('Exception: ' + (err && err.message ? err.message : String(err)), '#b91c1c');
          clearTimers();
          activeUtter = null;
        }
      }

      function init() {
        const supported = !!(synth && typeof window.SpeechSynthesisUtterance !== 'undefined');
        log('init', {
          supported: supported,
          ua: navigator.userAgent
        });
        if (!supported) {
          setStatus('Web Speech API not available in this browser.', '#b91c1c');
          playBtn.disabled = true;
          stopBtn.disabled = true;
          refreshBtn.disabled = true;
          return;
        }

        renderVoices();
        if (typeof synth.addEventListener === 'function') {
          synth.addEventListener('voiceschanged', renderVoices);
        } else {
          synth.onvoiceschanged = renderVoices;
        }

        refreshBtn.addEventListener('click', renderVoices);
        playBtn.addEventListener('click', function () {
          if (robustChromeModeEl && robustChromeModeEl.checked && isChromeLikeBrowser()) {
            playTtsRobust();
            return;
          }
          playTts();
        });
        stopBtn.addEventListener('click', function () { stopSpeaking('manual'); });
        clearLogBtn.addEventListener('click', function () { logEl.textContent = ''; });

        window.addEventListener('beforeunload', function () {
          stopSpeaking('unload');
        });
      }

      init();
    })();
  </script>
</body>
</html>
